name: CI Pipeline

on: [push]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mlflow scikit-learn pandas dagshub

      - name: Run Training
        run: |
          # Run the MLflow project without creating a new conda environment
          mlflow run MLProject --no-conda
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

      - name: Build Docker Image
        run: |
          # Create a Docker image from the MLflow model
          mlflow models build-docker -m "models:/house-price-model/1" -n "yanas/house-price-model"