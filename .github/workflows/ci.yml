name: CI Pipeline 

on:
  push:
    branches: [ main ]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python Membangun_model/modelling_tuning.py

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: Membangun_model/artifacts/

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          LATEST_RUN_ID=$(ls Membangun_model/artifacts/predictions_*.csv | head -n 1 | cut -d'_' -f2 | cut -d'.' -f1)
          IMAGE_TAG="$DOCKER_USERNAME/house-price-model:$LATEST_RUN_ID"
          
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
