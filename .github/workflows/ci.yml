name: CI Pipeline

on: [push]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mlflow scikit-learn pandas dagshub kaggle

      - name: Run Training
        run: |
          mlflow run MLProject --env-manager=local
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_ALLOW_FILE_STORE: "true"

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image from MLflow model
        run: |
          RUN_ID=$(cat MLProject/last_run_id.txt)
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/house-price-model:latest"
          
          export MLFLOW_TRACKING_URI=https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/${{ secrets.DAGSHUB_REPO_NAME }}.mlflow
          export MLFLOW_TRACKING_USERNAME=${{ secrets.DAGSHUB_USERNAME }}
          export MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_TOKEN }}
          
          mlflow artifacts download --artifact-uri "runs:/$RUN_ID/model" --dst-path ./model_local
          mlflow models build-docker -m ./model_local -n "$IMAGE_NAME"

      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/house-price-model:latest"