name: CI Pipeline

on: [push]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mlflow scikit-learn pandas dagshub

      - name: Run Training
        run: |
          mlflow run MLProject --env-manager=local
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_ALLOW_FILE_STORE: "true"

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image from MLflow model
        run: |
          # Membaca ID dari file yang dihasilkan skrip Python
          RUN_ID=$(cat MLProject/last_run_id.txt)
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/house-price-model:latest"
          # Kita gunakan 'latest' atau $RUN_ID, pastikan konsisten
          mlflow models build-docker -m "runs:/$RUN_ID/model_house_price" -n "$IMAGE_NAME"

      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/house-price-model:latest"